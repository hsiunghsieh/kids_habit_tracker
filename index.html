
<!DOCTYPE html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#ffeef8 0%,#e8f4ff 50%,#fff8e8 100%);min-height:100vh;color:#4a3f5c}
:root{
  --pink:#ff6eb4;--pink-light:#ffe4f3;--pink-pale:#fff0f9;

  --orange:#ff9050;--orange-light:#ffe8d6;

  --text:#4a3f5c;--text2:#7a6e8a;--text3:#b0a5c0;

}
.app{max-width:800px;margin:0 auto;padding:16px;min-height:100vh}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:24px}
.login-mascot{font-size:80px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.login-title{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}

.login-card{background:white;border-radius:28px;padding:32px;box-shadow:var(--shadow);width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px}

.input-field{width:100%;padding:14px 16px;border:2px solid #ede8ff;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);outline:none;transition:all .2s}

.guest-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:2px dashed #ede8ff;border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}

.app-header{background:white;border-radius:28px;padding:16px 20px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}

.checkin-item-icon{font-size:32px;width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.checkin-item-info{flex:1}
.checkin-item-name{font-size:16px;font-weight:800;color:var(--text)}
.checkin-item-reward{font-size:13px;font-weight:600;color:var(--text2);margin-top:2px}
.check-btn{width:50px;height:50px;border:none;border-radius:16px;font-size:24px;cursor:pointer;transition:all .3s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.check-btn.unchecked{background:#f5f0ff;color:var(--text3)}

@keyframes pop{0%{transform:scale(0.8)}100%{transform:scale(1)}}

.sub-tabs{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.sub-tab{padding:10px 18px;border:2px solid #ede8ff;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;background:white;white-space:nowrap;transition:all .2s}

.streak-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.streak-card{background:white;border-radius:20px;padding:16px;box-shadow:var(--shadow-sm);text-align:center;position:relative;overflow:hidden}
.streak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--purple),var(--pink))}

.streak-bar-bg{height:8px;background:#f0eaff;border-radius:50px;overflow:hidden;margin-top:8px}
.streak-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:50px;transition:width .6s ease}

.stat-card{background:white;border-radius:20px;padding:20px;box-shadow:var(--shadow-sm);text-align:center}
.stat-icon{font-size:32px;margin-bottom:8px}

.milestone-list{display:flex;flex-direction:column;gap:10px}

.sticker-wall{background:white;border-radius:24px;padding:24px;box-shadow:var(--shadow);min-height:200px}
.sticker-grid{display:flex;flex-wrap:wrap;gap:10px}
.sticker-item{font-size:40px;animation:stickerIn .3s cubic-bezier(.34,1.56,.64,1)}

.empty-state .es-icon{font-size:60px;margin-bottom:12px}

.gacha-container{display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px 0}

.gacha-machine:hover{transform:scale(1.03)}
.gacha-cost{background:var(--yellow-light);border:2px solid var(--yellow);border-radius:50px;padding:10px 24px;font-size:16px;font-weight:800;color:#8b6914;display:flex;align-items:center;gap:8px}
.gacha-btn-main{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;font-size:18px;font-weight:900;padding:16px 40px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 20px rgba(167,139,250,0.4);transition:all .2s;font-family:'Nunito',sans-serif}

/* GACHA HISTORY — the main new section */

.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}

.input-sm{padding:10px 12px;border:2px solid #ede8ff;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:14px;color:var(--text);outline:none;width:100%}

.prize-info{flex:1}

@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

<body>
<div class="app" id="app"></div>
<script>
const STICKERS=['⭐','🌟','✨','💫','🎀','🌈','🦋','🌸','🍭','🎊','🎁','🏆','👑','💎','🌺','🦄','🍦','🎠','🎪','🎨','🌙','☀️','🌻','🍓','🍰','🎶','🐬','🐱','🐻','🐼'];

// ══════════════════════════════════════════════════════
// 🔧 將下方網址換成你的 Apps Script 部署網址
// ══════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzMmb5GtJtqtv8QUsczZLTs6JNtfaxonUluXoRSAgkxV4YCGiRpEclxjdEDtuzCBGOoIw/exec';
// ══════════════════════════════════════════════════════

let _localCache = null;

function getToday(){return new Date().toISOString().slice(0,10)}
function getData(){return _localCache}

// 儲存：寫本機快取 + Google Sheets
async function saveData(d){
  _localCache = d;
  if(d.isGuest){localStorage.setItem('kidsHabitGuest',JSON.stringify(d));return;}
  if(!GAS_URL||GAS_URL.startsWith('你的')){localStorage.setItem('kidsHabit2',JSON.stringify(d));return;}
  try{
    await fetch(GAS_URL,{
      method:'POST',
      body:JSON.stringify({nickname:d.nickname, payload:JSON.stringify(d)})
    });
  }catch(e){
    console.warn('GAS 寫入失敗，改存 localStorage',e);
    localStorage.setItem('kidsHabit2',JSON.stringify(d));
  }
}

// 從 Google Sheets 讀取
async function loadFromCloud(nickname){
  if(!GAS_URL||GAS_URL.startsWith('你的')) return null;
  try{
    const res = await fetch(GAS_URL+'?nickname='+encodeURIComponent(nickname));
    const data = await res.json();
    if(data.ok) return JSON.parse(data.payload);
  }catch(e){console.warn('GAS 讀取失敗',e);}
  return null;
}

function defaultData(nickname,password=''){
  return{nickname,password,isGuest:!password,stickers:0,stickerWall:[],
    checkinLog:{},challengeLog:{},streakData:{},
    gachaHistory:[],
    dailyItems:[
      {id:1,icon:'🌅',name:'早起床',reward:2},{id:2,icon:'🦷',name:'刷牙',reward:2},
      {id:3,icon:'📚',name:'讀書30分鐘',reward:3},{id:4,icon:'🛏️',name:'整理床鋪',reward:2},{id:5,icon:'🥗',name:'吃蔬菜',reward:2},
    ],
    challengeItems:[
      {id:1,icon:'🤸',name:'做10下伏地挺身',reward:5},{id:2,icon:'🎨',name:'畫一幅畫',reward:5},{id:3,icon:'🧩',name:'完成一個拼圖',reward:6},
    ],
    streakItems:[
      {id:1,icon:'🌅',name:'早起床',targetDays:7,bonusReward:10},{id:2,icon:'📚',name:'讀書30分鐘',targetDays:14,bonusReward:20},
    ],
    gachaCost:10,
    gachaPrizes:[
      {id:1,icon:'🎊',name:'彩帶禮盒',rarity:'common',prob:40},{id:2,icon:'🎮',name:'遊戲時間',rarity:'rare',prob:25},
      {id:3,icon:'🍦',name:'冰淇淋',rarity:'rare',prob:20},{id:4,icon:'🎪',name:'去遊樂場',rarity:'epic',prob:10},{id:5,icon:'👑',name:'國王特權',rarity:'legendary',prob:5},
    ],
    totalCheckinDays:0,completedChallenges:[],
  }
}

let state={data:null,page:'daily',subPage:'challenges',adminUnlocked:false,showModal:null,lastResult:null,historyFilter:'all'};

async function init(){
  // 先嘗試讀訪客快取（以防斷網）
  try{const g=localStorage.getItem('kidsHabitGuest');if(g){_localCache=JSON.parse(g)}}catch{}
  try{const s=localStorage.getItem('kidsHabit2');if(s){_localCache=JSON.parse(s)}}catch{}
  if(_localCache){state.data=_localCache;render();}else{renderLogin();}
}
function logout(){state.data=null;_localCache=null;state.adminUnlocked=false;state.page='daily';renderLogin()}

function renderLogin(){
  document.getElementById('app').innerHTML=`
  <div class="login-screen">
    <div class="login-mascot">🌈</div>
    <h1 class="login-title">好習慣養成計畫 🌟</h1>
    <p class="login-subtitle">每天一點點，越來越棒！</p>
    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" id="tab-login" onclick="switchLoginTab('login')">登入</button>

function switchLoginTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-register').classList.toggle('active',t==='register');
  document.getElementById('login-form').style.display=t==='login'?'':'none';
  document.getElementById('register-form').style.display=t==='register'?'':'none';
}
async function doLogin(){
  const nick=document.getElementById('l-nick').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  if(!nick){err.textContent='請輸入暱稱！';err.style.display='block';return}
  err.style.display='none';
  // 顯示載入中
  document.querySelector('#login-form .btn-primary').textContent='⏳ 登入中...';
  // 先查 Firestore
  let saved = await loadFromCloud(nick);
  // fallback 到 localStorage
  if(!saved){try{const ls=localStorage.getItem('kidsHabit2');if(ls){const d=JSON.parse(ls);if(d.nickname===nick)saved=d;}}catch{}}
  if(saved){
    if(saved.password&&saved.password!==pass){
      err.textContent='密碼錯誤！';err.style.display='block';
      document.querySelector('#login-form .btn-primary').textContent='🚀 出發！';return;
    }
    _localCache=saved;state.data=saved;
  }else{
    state.data=defaultData(nick,pass);_localCache=state.data;
  }
  await saveData(state.data);render();
}
async function doRegister(){
  const nick=document.getElementById('r-nick').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  const err=document.getElementById('r-err');
  err.style.display='none';
  if(!nick){err.textContent='請輸入暱稱！';err.style.display='block';return}
  if(!pass){err.textContent='請輸入密碼！';err.style.display='block';return}
  if(pass!==pass2){err.textContent='兩次密碼不同！';err.style.display='block';return}
  // 檢查雲端是否已有此暱稱
  const existing = await loadFromCloud(nick);
  if(existing){err.textContent='此暱稱已被使用！';err.style.display='block';return}
  state.data=defaultData(nick,pass);_localCache=state.data;
  await saveData(state.data);render();
}

async function useGachaPrize(idx){
  const d=state.data;

    showToast(`🎉 ${d.gachaHistory[idx].icon} ${d.gachaHistory[idx].name} 已使用！`);

  }
}

  const t=typeMap[m.type];
  const isEdit=m.type.startsWith('edit');
  const titles={daily:['✏️ 修改打卡項目','➕ 新增打卡項目'],challenge:['✏️ 修改挑戰','➕ 新增挑戰'],streak:['✏️ 修改堅持項目','➕ 新增堅持項目'],prize:['✏️ 修改獎項','➕ 新增獎項']};
  const title=titles[t][isEdit?0:1];
  let fields='';
  if(t==='daily'||t==='challenge'){
    const def=m.item||{icon:t==='daily'?'🌟':'🎯',name:'',reward:t==='daily'?2:5};
    fields=`
    <div class="form-group"><div class="form-label">表情符號（直接貼入即可）</div><input class="input-sm" id="m-icon" value="${def.icon}" placeholder="🌟"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">項目名稱</div><input class="input-sm" id="m-name" value="${def.name}"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">獲得貼紙數</div><input class="input-sm" id="m-reward" type="number" value="${def.reward}" min="1"/></div>`;
  }else if(t==='streak'){
    const def=m.item||{icon:'🔥',name:'',targetDays:7,bonusReward:10};
    fields=`
    <div class="form-group"><div class="form-label">表情符號</div><input class="input-sm" id="m-icon" value="${def.icon}"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">項目名稱</div><input class="input-sm" id="m-name" value="${def.name}"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">目標天數</div><input class="input-sm" id="m-target" type="number" value="${def.targetDays}" min="1"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">達標獎勵貼紙</div><input class="input-sm" id="m-bonus" type="number" value="${def.bonusReward}" min="1"/></div>`;
  }else if(t==='prize'){
    const def=m.item||{icon:'🎁',name:'',rarity:'common',prob:10};
    fields=`
    <div class="form-group"><div class="form-label">表情符號</div><input class="input-sm" id="m-icon" value="${def.icon}"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">獎項名稱</div><input class="input-sm" id="m-name" value="${def.name}"/></div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">稀有度</div>
      <select class="input-sm" id="m-rarity">
        <option value="common" ${def.rarity==='common'?'selected':''}>普通</option>
        <option value="rare" ${def.rarity==='rare'?'selected':''}>稀有</option>
        <option value="epic" ${def.rarity==='epic'?'selected':''}>史詩</option>
        <option value="legendary" ${def.rarity==='legendary'?'selected':''}>傳說</option>
      </select>
    </div>
    <div class="form-group" style="margin-top:10px"><div class="form-label">出現機率 (%)</div><input class="input-sm" id="m-prob" type="number" value="${def.prob}" min="1" max="100"/></div>`;
  }
  return`<div class="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">${title}</div>
    ${fields}
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveItem('${t}')">儲存</button>
    </div>
  </div></div>`;
}

// ACTIONS
function setPage(p){state.page=p;render()}
function setSubPage(p){state.subPage=p;render()}
function closeModal(e){if(!e||e.target===e.currentTarget){state.showModal=null;render()}}
function openAdd(type){state.showModal={type:'add-'+type,item:null};render()}
function openEdit(type,id){
  const d=state.data;
  const maps={daily:d.dailyItems,challenge:d.challengeItems,streak:d.streakItems,prize:d.gachaPrizes};
  const item=maps[type].find(i=>i.id===id);
  state.showModal={type:'edit-'+type,item:{...item}};render();
}
async function deleteItem(type,id){
  const d=state.data;
  const maps={daily:'dailyItems',challenge:'challengeItems',streak:'streakItems',prize:'gachaPrizes'};
  d[maps[type]]=d[maps[type]].filter(i=>i.id!==id);
  await saveData(d);render();showToast('🗑️ 已刪除！');
}
async function saveItem(type){
  const d=state.data,m=state.showModal,isEdit=m.type.startsWith('edit');
  const icon=document.getElementById('m-icon').value.trim()||'🌟';
  const name=document.getElementById('m-name').value.trim();
  if(!name){showToast('請輸入名稱！');return}
  if(type==='daily'||type==='challenge'){
    const reward=parseInt(document.getElementById('m-reward').value)||2;
    const arr=type==='daily'?d.dailyItems:d.challengeItems;
    if(isEdit){const i=arr.findIndex(x=>x.id===m.item.id);arr[i]={...arr[i],icon,name,reward}}
    else arr.push({id:Date.now(),icon,name,reward});
  }else if(type==='streak'){
    const targetDays=parseInt(document.getElementById('m-target').value)||7;
    const bonusReward=parseInt(document.getElementById('m-bonus').value)||10;
    if(isEdit){const i=d.streakItems.findIndex(x=>x.id===m.item.id);d.streakItems[i]={...d.streakItems[i],icon,name,targetDays,bonusReward}}
    else d.streakItems.push({id:Date.now(),icon,name,targetDays,bonusReward});
  }else if(type==='prize'){
    const rarity=document.getElementById('m-rarity').value;
    const prob=parseInt(document.getElementById('m-prob').value)||10;
    if(isEdit){const i=d.gachaPrizes.findIndex(x=>x.id===m.item.id);d.gachaPrizes[i]={...d.gachaPrizes[i],icon,name,rarity,prob}}
    else d.gachaPrizes.push({id:Date.now(),icon,name,rarity,prob});
  }
  await saveData(d);state.showModal=null;render();showToast('✅ 儲存成功！');
}
async function saveGachaCost(){
  const v=parseInt(document.getElementById('gacha-cost-input').value)||10;
  state.data.gachaCost=v;await saveData(state.data);render();showToast('✅ 費用已更新！');
}
function unlockAdmin(){
  const p=document.getElementById('admin-pass').value;
  const correct=state.data.password;
  if(!correct){// 訪客模式沒有密碼，任意輸入都可進入
    state.adminUnlocked=true;render();return;
  }
  if(p===correct){state.adminUnlocked=true;render()}
  else document.getElementById('admin-err').style.display='block';
}
async function toggleCheckin(id){
  const d=state.data,today=getToday();
  if(!d.checkinLog[today])d.checkinLog[today]={};
  const wasAllDone=d.dailyItems.every(i=>d.checkinLog[today][i.id]);
  const wasDone=d.checkinLog[today][id];
  const item=d.dailyItems.find(i=>i.id===id);
  if(wasDone){
    delete d.checkinLog[today][id];
    d.stickers=Math.max(0,d.stickers-item.reward);
  }else{
    d.checkinLog[today][id]=true;
    d.stickers+=item.reward;
    addStickers(item.reward);
    showToast(`${item.icon} +${item.reward}⭐ 打卡成功！`);
    const si=d.streakItems.find(s=>s.name===item.name);
    if(si){d.streakData[si.id]=(d.streakData[si.id]||0)+1;if(d.streakData[si.id]===si.targetDays){d.stickers+=si.bonusReward;showToast(`🔥 堅持${si.targetDays}天！+${si.bonusReward}⭐`)}}
    const nowAllDone=d.dailyItems.every(i=>d.checkinLog[today][i.id]);
    if(!wasAllDone&&nowAllDone){d.stickers+=5;addStickers(5);d.totalCheckinDays++;showToast('🎉 今天全部完成！+5⭐ 額外獎勵！')}
  }
  await saveData(d);render();
}
async function toggleChallenge(id){
  const d=state.data,today=getToday();
  if(!d.challengeLog[today])d.challengeLog[today]={};
  const wasDone=d.challengeLog[today][id];
  const item=d.challengeItems.find(i=>i.id===id);
  if(wasDone){delete d.challengeLog[today][id];d.stickers=Math.max(0,d.stickers-item.reward)}
  else{
    d.challengeLog[today][id]=true;d.stickers+=item.reward;addStickers(item.reward);
    d.completedChallenges.push({...item,date:today});
    showToast(`${item.icon} 挑戰成功！+${item.reward}⭐`);
  }
  await saveData(d);setSubPage('challenges');
}
function addStickers(count){
  const d=state.data;
  for(let i=0;i<count;i++)d.stickerWall.push(STICKERS[Math.floor(Math.random()*STICKERS.length)]);
}
async function doGacha(){
  const d=state.data;
  if(d.stickers<d.gachaCost)return;
  const prizes=d.gachaPrizes;
  if(!prizes.length){showToast('還沒有設定獎項！');return}
  d.stickers-=d.gachaCost;
  const total=prizes.reduce((a,b)=>a+b.prob,0);
  let rand=Math.random()*total,result=prizes[prizes.length-1];
  for(const p of prizes){rand-=p.prob;if(rand<=0){result=p;break}}
  const entry={...result,date:getToday(),cost:d.gachaCost,used:false,usedDate:null};
  d.gachaHistory.push(entry);
  state.lastResult=result;
  await saveData(d);render();
  showToast(`🎊 獲得：${result.icon} ${result.name}！`);
}

// helpers
function rarityBg(r){return{common:'#f0f0f0',rare:'#e0f0ff',epic:'#ede9fe',legendary:'#fff5d6'}[r]||'#f0f0f0'}
function rarityColor(r){return{common:'#666',rare:'#1a5fa8',epic:'#5b21b6',legendary:'#8b6914'}[r]||'#666'}
function rarityName(r){return{common:'普通',rare:'稀有',epic:'史詩',legendary:'傳說'}[r]||'普通'}

let toastTimeout;
function showToast(msg){
  const old=document.querySelector('.toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);clearTimeout(toastTimeout);
  toastTimeout=setTimeout(()=>t.remove(),2500);
}

init();
</script>
</body>
</html>
